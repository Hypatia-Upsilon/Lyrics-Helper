<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LRC Time Axis Helper Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=JetBrains+Mono:wght@400&display=swap" rel="stylesheet">
  <!-- 引入样式表 -->
  <link rel="stylesheet" href="./src/css/main.css">
</head>
<body>

  <header>
    <h1 data-i18n="app_title">LRC Time Axis Helper</h1>
    <div class="header-controls">
      <select id="langSelector" class="lang-select">
        <option value="zh-CN">中文</option>
        <option value="en">English</option>
        <option value="fr">Français</option>
      </select>
    </div>
  </header>

  <div class="main-container">

    <!-- 输入区域 -->
    <div class="card editor-box input-area">
      <div class="card-header">
        <span class="card-title" data-i18n="input_label">Original Lyrics</span>
        <div style="display: flex; gap: 8px;">
          <button id="undoBtn" class="btn btn-text disabled" title="Undo">
            <svg xmlns="http://www.w3.org/2000/svg" height="20" viewBox="0 -960 960 960" width="20" fill="currentColor"><path d="M280-120 80-320l200-200 57 56-104 104h287q116 0 198-82t82-198q0-116-82-198t-198-82H280v-80h240q150 0 255 105t105 255q0 150-105 255T520-240H233l104 104-57 56Z" /></svg>
          </button>
          <button id="clearBtn" class="btn btn-text" data-i18n="btn_clear">Clear</button>
        </div>
      </div>
      <textarea id="inputText" class="text-field" data-i18n-placeholder="input_placeholder" placeholder="Paste content here..." spellcheck="false"></textarea>
    </div>

    <!-- 控制面板 -->
    <div class="card controls-card">
      <div class="controls-panel">

        <!-- 调节范围开关 -->
        <div>
          <div class="switch-container">
            <span class="card-title" data-i18n="scope_title" style="margin:0">Time Scope</span>
          </div>
          <label class="switch-container" style="background: rgba(0,0,0,0.02); padding: 8px; border-radius: 8px;">
            <span class="switch-label" data-i18n="scope_switch_label">Only &lt;...&gt;</span>
            <div class="md3-switch">
              <input type="checkbox" id="onlyWordTagsSwitch">
              <span class="slider"></span>
            </div>
          </label>
          <div class="helper-text" id="modeTip" data-i18n="tip_scope_all">
            Target: All timestamps [ ] and &lt; &gt;
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- 精确偏移 -->
        <div>
          <div style="display: flex; justify-content: space-between; align-items: center;">
            <span class="card-title" data-i18n="precise_title">Offset (ms)</span>
            <!-- 偏移量显示徽标 -->
            <span id="offsetBadge" class="badge badge-neutral">0ms</span>
          </div>
          <div style="height: 8px;"></div>
          <div class="input-row">
            <input type="number" id="preciseOffset" value="0" placeholder="e.g. 500 or -500">
          </div>
          <button id="applyOffsetBtn" class="btn btn-filled" style="width: 100%; margin-top: 8px;" data-i18n="btn_apply">Apply Offset</button>
        </div>

        <div class="section-divider"></div>

        <!-- 快捷按钮 -->
        <div>
          <span class="card-title" data-i18n="quick_title">Quick Adjust</span>
          <div style="height: 8px;"></div>
          <div id="quickButtons" class="btn-grid"></div>

          <!-- 按钮自定义 -->
          <div style="margin-top: 12px; display:flex; gap: 8px;">
            <input type="text" id="customBtnConfig" value="100, 500" placeholder="100, 500" style="font-size: 0.8rem; padding: 6px;">
            <button id="updateBtnsBtn" class="btn btn-tonal" style="width: auto; height: auto; padding: 0 12px; font-size: 0.75rem;" data-i18n="btn_update">Set</button>
          </div>
        </div>

        <div class="section-divider"></div>

        <!-- 高级工具 -->
        <div>
          <span class="card-title" data-i18n="tools_title">Advanced Tools</span>
          <div style="height: 8px;"></div>

          <!-- 同步标签按钮 -->
          <button id="syncTransTagsBtn" class="btn btn-tonal" style="margin-bottom: 8px;" data-i18n="btn_sync_tags">
            Sync Tags to Translation
          </button>
          <div class="helper-text" data-i18n="tip_sync_tags">
            Copy start/end &lt;&gt; from original to translation line.
          </div>

          <div style="height: 12px;"></div>

          <!-- 清理工具 -->
          <div class="btn-group-vertical">
            <select id="cleanTargetSelect" class="md3-select">
              <option value="translation" data-i18n="clean_opt_trans">Target: Translation (Duplicate Time)</option>
              <option value="original" data-i18n="clean_opt_orig">Target: Original (First Time)</option>
              <option value="all" data-i18n="clean_opt_all">Target: All Lines</option>
            </select>
            <button id="executeCleanBtn" class="btn btn-error-tonal" data-i18n="btn_execute_clean">
              Remove &lt;...&gt; Tags
            </button>
          </div>
        </div>

        <div style="flex:1"></div>

        <button id="copyResultBtn" class="btn btn-filled" style="background-color: #2e7d32; margin-top: 16px; box-shadow: 0 2px 5px rgba(0,0,0,0.2);" data-i18n="btn_copy">
          Copy Result
        </button>
      </div>
    </div>

    <!-- 输出区域 -->
    <div class="card editor-box output-area">
      <div class="card-header">
        <span class="card-title" data-i18n="output_label">Result</span>
      </div>
      <textarea id="outputText" class="text-field" readonly placeholder="Result will appear here..." spellcheck="false"></textarea>
    </div>

  </div>

  <div id="snackbar">
    Message
  </div>

  <!-- 引入脚本 -->
  <script src="./src/js/main.js" defer></script>
</body>
</html>
